          <circle cx="84" cy="285" r="6" fill="#34d399" />
          <circle cx="84" cy="315" r="6" fill="#4ce8dc" />
          <rect x="8" y="35" width="20" height="20" rx="4" fill="#263331" stroke="#5a6764" />
