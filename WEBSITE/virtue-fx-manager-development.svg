<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Virtue FX Manager development interface</title>
  <desc id="desc">A cyan and green product screenshot illustration showing a thumbnail manager, plugin list, and filters.</desc>
  <defs>
    <linearGradient id="window" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172321" />
      <stop offset="1" stop-color="#0d1212" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#25312f" />
      <stop offset="1" stop-color="#1a2020" />
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4ce8dc" />
      <stop offset="1" stop-color="#1c9ed2" />
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#34d399" />
      <stop offset="1" stop-color="#07958d" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#001c1a" flood-opacity=".35" />
    </filter>
    <style>
      .label{font:700 18px Inter,Arial,sans-serif;fill:#dff7f3}
      .small{font:650 14px Inter,Arial,sans-serif;fill:#9cb7b3}
      .tiny{font:750 12px Inter,Arial,sans-serif;fill:#c7e7e2}
      .rowtext{font:600 13px Inter,Arial,sans-serif;fill:#d1dfdc}
      .muted{fill:#8ea5a1}
      .line{stroke:#465552;stroke-width:1}
      .cyan-stroke{stroke:#40ded2;stroke-width:2}
      .button-text{font:800 13px Inter,Arial,sans-serif;fill:#05211f}
    </style>
  </defs>

  <rect width="1600" height="900" rx="20" fill="url(#window)" />
  <rect x="1" y="1" width="1598" height="898" rx="20" fill="none" stroke="#49615c" />

