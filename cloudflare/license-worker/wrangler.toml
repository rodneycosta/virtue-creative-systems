name = "vfxm-license-worker"
main = "src/index.js"
compatibility_date = "2026-05-19"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "vfxm-licenses"
database_id = "5c3f4e69-56b8-46b2-a71d-bc90c94c64f7"
migrations_dir = "migrations"

# [[r2_buckets]]
# binding = "RELEASES"
# bucket_name = "vfxm-releases"

[vars]
STORE_PROVIDER = "lemonsqueezy"
STORE_MODE = "test"
VFXM_SITE_ORIGIN = "https://virtuecreativesystems.com"
VFXM_CHECKOUT_SUCCESS_URL = "https://virtuecreativesystems.com/checkout/success/"
VFXM_CHECKOUT_CANCEL_URL = "https://virtuecreativesystems.com/checkout/cancel/"
VFXM_RECEIPT_DOWNLOAD_URL = "https://virtuecreativesystems.com/download/vfxm/"
VFXM_RELEASE_CHANNEL = "stable"
VFXM_DEFAULT_GRACE_DAYS = "14"
VFXM_DOWNLOAD_URL_TTL_SECONDS = "900"
VFXM_ENABLE_TRIAL = "false"
VFXM_ALLOWED_ORIGINS = "https://virtuecreativesystems.com"
